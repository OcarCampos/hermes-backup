[global]
   workgroup = WORKGROUP
   server string = Silo Samba Server
   server min protocol = SMB2
   server signing = auto
   disable spoolss = yes
   log file = /var/log/samba/log.%m
   max log size = 1000
   panic action = /usr/bin/smbd
   load printers = no
   printing = bsd
   printcap name = /dev/null

[hermes-workspace]
   path = /mnt/data/Developing/hermes-workspace
   browseable = yes
   read only = no
   create mask = 0644
   directory mask = 0755
   force user = ocarjohann
   valid users = ocarjohann
